name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: cd backend && ruff check app/

      - name: Ruff format check
        run: cd backend && ruff format --check app/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      mongo:
        image: mongo:7
        ports: [27017:27017]
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      MONGO_URI: mongodb://admin:testpass@localhost:27017/nutrimed_test?authSource=admin
      MONGO_DB_NAME: nutrimed_test
      REDIS_URL: redis://localhost:6379/1
      RABBITMQ_URL: amqp://guest:guest@localhost:5672//
      JWT_SECRET: test-secret-key-for-ci-only
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: 30
      AES_KEY: test-aes-key-for-ci-32bytes!
      OLLAMA_BASE_URL: http://localhost:11434
      APP_NAME: NutriMed AI Test
      DEBUG: true
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/unit/ -v --tb=short --junitxml=reports/unit-results.xml --cov=app --cov-report=xml:reports/coverage.xml

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/integration/ -v --tb=short --junitxml=reports/integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/reports/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/reports/coverage.xml

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check & build
        run: cd frontend && npm run build

  microservices-lint:
    name: Microservices Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - ocr-service
          - llm-service
          - nutrition-service
          - fitness-service
          - pdf-service
          - rag-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install and lint
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install ruff
          ruff check app/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, microservices-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: api-gateway
            context: ./backend
          - name: frontend
            context: ./frontend
          - name: ocr-service
            context: ./services/ocr-service
          - name: llm-service
            context: ./services/llm-service
          - name: nutrition-service
            context: ./services/nutrition-service
          - name: fitness-service
            context: ./services/fitness-service
          - name: pdf-service
            context: ./services/pdf-service
          - name: rag-service
            context: ./services/rag-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: nutrimed/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety bandit

      - name: Check Python dependencies for vulnerabilities
        run: cd backend && safety check -r requirements.txt --output json || true

      - name: Bandit security lint
        run: cd backend && bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: backend/bandit-report.json
